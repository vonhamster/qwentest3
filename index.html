<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tauri App</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      min-height: 100vh;
      background-color: #f8f9fa;
    }
    .app-container {
      max-width: 100%;
      padding-bottom: 60px;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #dee2e6;
      z-index: 1000;
    }
    .nav-link {
      color: #6c757d;
      text-align: center;
      padding: 0.5rem;
      font-size: 0.75rem;
    }
    .nav-link.active {
      color: #0d6efd;
    }
    .nav-link i {
      display: block;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
    }
  </style>
</head>
<body>
  <div id="app" class="app-container"></div>
  
  <nav class="navbar bottom-nav">
    <div class="container-fluid">
      <div class="row w-100 m-0">
        <div class="col">
          <a href="/" class="nav-link active" data-route="/">
            <span>🏠</span>
            Главная
          </a>
        </div>
        <div class="col">
          <a href="/about" class="nav-link" data-route="/about">
            <span>ℹ️</span>
            О приложении
          </a>
        </div>
        <div class="col">
          <a href="/settings" class="nav-link" data-route="/settings">
            <span>⚙️</span>
            Настройки
          </a>
        </div>
      </div>
    </div>
  </nav>

  <script src="/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
